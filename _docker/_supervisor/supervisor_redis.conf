[program:redis]
command=redis-server /etc/redis/redis.conf --daemonize no
user=redis
autostart=true
autorestart=true
startsecs=10
startretries=3
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisor_redis_info.log
stdout_logfile_maxbytes=0
stderr_logfile=/var/log/supervisor_redis_error.log
stderr_logfile_maxbytes=0
