<VirtualHost *:443>

	## Respond to all Aliases
    ServerName _  
    ServerAlias *
    DocumentRoot /var/www/html
    
	## Enhance Webserver Performance
	KeepAlive On
	MaxKeepAliveRequests 250
	KeepAliveTimeout 3

	# Global timeout for CGI/Python scripts (300 seconds)
	TimeOut 300

	## PHP Handler
    <FilesMatch \.php$>
         SetHandler "proxy:fcgi://127.0.0.1:9000"
    </FilesMatch>

	## No Indexes but index.php
	DirectoryIndex disabled
	DirectoryIndex index.php index.html

    # SSL Certificate Files
    SSLEngine on
    SSLCertificateFile /opt/sf_ssl/cert.pem
    SSLCertificateKeyFile /opt/sf_ssl/privkey.pem

	## Security Headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header set X-XSS-Protection "1; mode=block" 
    Header set X-Content-Type-Options nosniff
    Header set X-Frame-Options "sameorigin"
    Header set Referrer-Policy "same-origin" 

	## Directory Preferences
	<Directory /var/www/>
		Options -Indexes
		AllowOverride All
	</Directory>

	## Allow HTTP2 Protocol
	Protocols h2 h2c http/1.1

	## GZip Compression for Different File Types
	<IfModule mod_deflate.c>
		AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/x-javascript application/json application/xml
		AddOutputFilterByType DEFLATE image/svg+xml application/x-font-ttf application/x-font-opentype
		BrowserMatch ^Mozilla/4 gzip-only-text/html
		BrowserMatch ^Mozilla/4\.0[678] no-gzip
		BrowserMatch \bMSIE !no-gzip !gzip-only-text/html
	</IfModule>

	## Headers cache Mod
	<IfModule mod_headers.c>
		<FilesMatch "\.(jpg|jpeg|png|gif|js|css|woff|woff2|ttf|svg)$">
				Header set Cache-Control "max-age=2592000, public"
		</FilesMatch>
	</IfModule>
	
</VirtualHost>