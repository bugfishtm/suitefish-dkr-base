services:
  sf-base:
    build: 
      context: .
      no_cache: true
    image: bugfishtm/sf-base:latest
    pull_policy: never
    restart: always
    volumes:
      - sf-ssl:/opt/sf_ssl
      - sf-certbot:/etc/letsencrypt
      - sf-mysql:/var/lib/mysql
      - sf-data:/var/www/html/_data
      - sf-image:/var/www/html/_image
    ports:
      - 80:80
      - 443:443
    environment:
      TZ:                                       "${sf_timezone}"  
      PHP_MEMORY_LIMIT:                         "${SF_PHP_MEMORY_LIMIT}"
      PHP_MAX_EXECUTION_TIME:                   "${SF_PHP_MAX_EXECUTION_TIME}"
      PHP_POST_MAX_SIZE:                        "${SF_PHP_POST_MAX_SIZE}"
      PHP_UPLOAD_MAX_SIZE:                      "${SF_PHP_UPLOAD_MAX_SIZE}"
      PHP_MAX_INPUT_VARS:                       "${SF_PHP_MAX_INPUT_VARS}"
      PHP_MAX_INPUT_TIME:                       "${SF_PHP_MAX_INPUT_TIME}"
      PHP_OUTPUT_BUFFERING:                     "${SF_PHP_OUTPUT_BUFFERING}"
      PHP_ZLIB_OUTPUT_COMPRESSION:              "${SF_PHP_ZLIB_OUTPUT_COMPRESSION}"
      PHP_OPCACHE_ENABLE:                       "${SF_PHP_OPCACHE_ENABLE}"
      PHP_OPCACHE_MEMORY_CONSUMPTION:           "${SF_PHP_OPCACHE_MEMORY_CONSUMPTION}"
      PHP_OPCACHE_MAX_ACCELERATED_FILES:        "${SF_PHP_OPCACHE_MAX_ACCELERATED_FILES}"
      PHP_OPCACHE_VALIDATE_TIMESTAMPS:          "${SF_PHP_OPCACHE_VALIDATE_TIMESTAMPS}"
      PHP_OPCACHE_JIT:                          "${SF_PHP_OPCACHE_JIT}"
      PHP_OPCACHE_JIT_BUFFER_SIZE:              "${SF_PHP_OPCACHE_JIT_BUFFER_SIZE}"
      PHP_FPM_PM:                               "${SF_PHP_FPM_PM}"
      PHP_FPM_PM_MAX_CHILDREN:                  "${SF_PHP_FPM_PM_MAX_CHILDREN}"
      PHP_FPM_PM_START_SERVERS:                 "${SF_PHP_FPM_PM_START_SERVERS}"
      PHP_FPM_PM_MIN_SPARE_SERVERS:             "${SF_PHP_FPM_PM_MIN_SPARE_SERVERS}"
      PHP_FPM_PM_MAX_SPARE_SERVERS:             "${SF_PHP_FPM_PM_MAX_SPARE_SERVERS}"
      PHP_FPM_PM_MAX_REQUESTS:                  "${SF_PHP_FPM_PM_MAX_REQUESTS}"     
      sf_ct_update_on_start:                    "${sf_ct_update_on_start}"  
      sf_timezone:                              "${sf_timezone}"
      sf_db_pass:                               "${sf_db_pass}"
      sf_url:                                   "${sf_url}"
      sf_secret:                                "${sf_secret}"    
      sf_letsencrypt_enable:                    "${sf_letsencrypt_enable}"
      sf_letsencrypt_domain:                    "${sf_letsencrypt_domain}"
      sf_letsencrypt_email:                     "${sf_letsencrypt_email}"
      SF_MYSQL_SETUP_BUFFER_POOL_SIZE:          "${SF_MYSQL_SETUP_BUFFER_POOL_SIZE}"
      SF_MYSQL_SETUP_BUFFER_POOL_INSTANCES:     "${SF_MYSQL_SETUP_BUFFER_POOL_INSTANCES}"
      SF_MYSQL_TABLE_OPEN_CACHE:                "${SF_MYSQL_TABLE_OPEN_CACHE}"
      SF_MYSQL_SETUP_LOG_SIZE:                  "${SF_MYSQL_SETUP_LOG_SIZE}"
      SF_MYSQL_MAX_CONN:                        "${SF_MYSQL_MAX_CONN}"
      SF_MYSQL_FLUSH_TRX_COMMIT:                "${SF_MYSQL_FLUSH_TRX_COMMIT}"
      SF_MYSQL_CAPACITY:                        "${SF_MYSQL_CAPACITY}"
      sf_db_host:                               "${sf_db_host}"   
      sf_db_db:                                 "${sf_db_db}"   
      sf_db_user:                               "${sf_db_user}"   
      sf_db_port:                               "${sf_db_port}"   
      sf_db_prefix:                             "${sf_db_prefix}"   
      sf_cookie_prefix:                         "${sf_cookie_prefix}"   
volumes:
  sf-ssl:
  sf-certbot:
  sf-mysql:
  sf-data:
  sf-image: